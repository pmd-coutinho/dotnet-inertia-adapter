name: Publish Prerelease

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-prerelease
  cancel-in-progress: false

jobs:
  publish:
    name: Publish prerelease packages
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: nuget-prerelease

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute prerelease versions
        id: versions
        run: |
          core_prefix=$(dotnet msbuild src/InertiaNet/InertiaNet.csproj -getProperty:InertiaNetCoreVersionPrefix)
          tooling_prefix=$(dotnet msbuild src/InertiaNet.Analyzers/InertiaNet.Analyzers.csproj -getProperty:InertiaNetToolingVersionPrefix)
          suffix="alpha.${{ github.event.workflow_run.run_number }}"

          echo "core_version=${core_prefix}-${suffix}" >> "$GITHUB_OUTPUT"
          echo "tooling_version=${tooling_prefix}-${suffix}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore InertiaNet.slnx

      - name: Pack InertiaNet
        run: dotnet pack src/InertiaNet/InertiaNet.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.versions.outputs.core_version }} -o artifacts

      - name: Pack Pathfinder Tool
        run: dotnet pack src/InertiaNet.Pathfinder/InertiaNet.Pathfinder.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.versions.outputs.tooling_version }} -o artifacts

      - name: Pack Pathfinder Build
        run: dotnet pack src/InertiaNet.Pathfinder.Build/InertiaNet.Pathfinder.Build.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.versions.outputs.tooling_version }} -o artifacts

      - name: Pack Analyzers
        run: dotnet pack src/InertiaNet.Analyzers/InertiaNet.Analyzers.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.versions.outputs.tooling_version }} -o artifacts

      - name: Stage Templates Package Sources
        run: bash scripts/stage-templates.sh src/InertiaNet.Templates "$RUNNER_TEMP/InertiaNet.Templates" "${{ steps.versions.outputs.core_version }}"

      - name: Pack Templates
        run: dotnet pack "$RUNNER_TEMP/InertiaNet.Templates/InertiaNet.Templates.csproj" --configuration Release -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.versions.outputs.tooling_version }} -o artifacts

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish packages to nuget.org
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          for package in artifacts/*.nupkg artifacts/*.snupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
